{% extends "base.html" %}
{% block title %}Nuevo Lead{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('leads_lista') }}" class="text-muted text-decoration-none small">
    <i class="bi bi-arrow-left"></i> Leads
  </a>
  <h2 class="fw-bold mb-0 mt-1"><i class="bi bi-person-plus text-primary"></i> Nuevo Lead</h2>
</div>

<div class="card" style="max-width:680px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre del contacto <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" required
                 placeholder="Ej. María González">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Empresa</label>
          <input type="text" name="empresa" class="form-control"
                 placeholder="Ej. Innova Tech S.A.">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" required
                 placeholder="contacto@empresa.com">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Teléfono</label>
          <input type="tel" name="telefono" class="form-control"
                 placeholder="Ej. +52 55 1234 5678">
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Servicio de interés</label>
          <input type="text" name="servicio_interes" class="form-control"
                 list="servicios_list" placeholder="Selecciona o escribe el servicio…">
          <datalist id="servicios_list">
            {% for s in servicios %}
            <option value="{{ s }}">
            {% endfor %}
          </datalist>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Notas</label>
          <textarea name="notas" class="form-control" rows="3"
                    placeholder="Información adicional sobre el lead…"></textarea>
        </div>

        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Crear Lead
          </button>
          <a href="{{ url_for('leads_lista') }}" class="btn btn-outline-secondary">
            Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}
