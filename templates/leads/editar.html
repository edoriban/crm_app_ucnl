{% extends "base.html" %}
{% block title %}Editar Lead{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('leads_detalle', lead_id=lead.id) }}"
     class="text-muted text-decoration-none small">
    <i class="bi bi-arrow-left"></i> {{ lead.nombre }}
  </a>
  <h2 class="fw-bold mb-0 mt-1">
    <i class="bi bi-pencil-square text-warning"></i> Editar Lead
  </h2>
</div>

<div class="card" style="max-width:680px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control"
                 value="{{ lead.nombre }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Empresa</label>
          <input type="text" name="empresa" class="form-control" value="{{ lead.empresa }}">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control"
                 value="{{ lead.email }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Teléfono</label>
          <input type="tel" name="telefono" class="form-control" value="{{ lead.telefono }}">
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Servicio de interés</label>
          <input type="text" name="servicio_interes" class="form-control"
                 list="servicios_list" value="{{ lead.servicio_interes }}">
          <datalist id="servicios_list">
            {% for s in servicios %}
            <option value="{{ s }}">
            {% endfor %}
          </datalist>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Notas</label>
          <textarea name="notas" class="form-control" rows="3">{{ lead.notas }}</textarea>
        </div>

        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-check-lg"></i> Guardar Cambios
          </button>
          <a href="{{ url_for('leads_detalle', lead_id=lead.id) }}"
             class="btn btn-outline-secondary">
            Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}
